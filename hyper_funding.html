<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyperliquid 资金费率查询</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  h1 { text-align: center; margin-bottom: 24px; font-size: 24px; color: #58a6ff; }
  .controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: flex-end; }
  .control-group { display: flex; flex-direction: column; gap: 4px; }
  .control-group label { font-size: 12px; color: #8b949e; }
  input, select, button { padding: 8px 12px; border: 1px solid #30363d; border-radius: 6px; background: #161b22; color: #e6edf3; font-size: 14px; outline: none; }
  input:focus, select:focus { border-color: #58a6ff; }
  button { background: #238636; border-color: #238636; cursor: pointer; font-weight: 600; }
  button:hover { background: #2ea043; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
  .stat-card .label { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
  .stat-card .value { font-size: 20px; font-weight: 700; }
  .positive { color: #3fb950; }
  .negative { color: #f85149; }
  .chart-container { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 20px; position: relative; height: 350px; }
  .table-container { background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
  .table-header { padding: 12px 16px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
  .table-header span { font-size: 14px; color: #8b949e; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px 16px; text-align: left; border-bottom: 1px solid #21262d; font-size: 13px; }
  th { background: #161b22; color: #8b949e; font-weight: 600; cursor: pointer; user-select: none; position: sticky; top: 0; }
  th:hover { color: #e6edf3; }
  th .sort-icon { margin-left: 4px; }
  .table-scroll { max-height: 500px; overflow-y: auto; }
  .table-scroll::-webkit-scrollbar { width: 6px; }
  .table-scroll::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  tr:hover td { background: #1c2128; }
  .loading { text-align: center; padding: 40px; color: #8b949e; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 60px 20px; color: #484f58; }
  .empty p { margin-top: 8px; font-size: 14px; }
  .progress { font-size: 12px; color: #8b949e; margin-left: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>Hyperliquid 历史资金费率</h1>

  <div class="controls">
    <div class="control-group">
      <label>币种</label>
      <input type="text" id="coin" value="BTC" placeholder="输入币种，如 BTC" style="width:120px" />
    </div>
    <div class="control-group">
      <label>时间范围</label>
      <select id="range">
        <option value="7">最近 7 天</option>
        <option value="30" selected>最近 30 天</option>
        <option value="90">最近 90 天</option>
        <option value="180">最近 180 天</option>
        <option value="365">最近 1 年</option>
        <option value="custom">自定义</option>
      </select>
    </div>
    <div class="control-group" id="customRange" style="display:none">
      <label>起止日期</label>
      <div style="display:flex;gap:6px">
        <input type="date" id="startDate" />
        <input type="date" id="endDate" />
      </div>
    </div>
    <div class="control-group">
      <label>&nbsp;</label>
      <button id="queryBtn" onclick="query()">查询</button>
    </div>
    <span id="progressText" class="progress"></span>
  </div>

  <div id="statsSection" style="display:none">
    <div class="stats">
      <div class="stat-card">
        <div class="label">当前费率</div>
        <div class="value" id="statCurrent">-</div>
      </div>
      <div class="stat-card">
        <div class="label">平均费率</div>
        <div class="value" id="statAvg">-</div>
      </div>
      <div class="stat-card">
        <div class="label">年化费率</div>
        <div class="value" id="statAnnual">-</div>
      </div>
      <div class="stat-card">
        <div class="label">最高 / 最低</div>
        <div class="value" id="statRange">-</div>
      </div>
      <div class="stat-card">
        <div class="label">数据条数</div>
        <div class="value" id="statCount">-</div>
      </div>
    </div>
  </div>

  <div class="chart-container" id="chartBox" style="display:none">
    <canvas id="chart"></canvas>
  </div>

  <div class="table-container">
    <div class="table-header">
      <span id="tableTitle">输入币种后点击查询</span>
    </div>
    <div class="table-scroll" id="tableScroll">
      <div class="empty" id="emptyState">
        <p>选择币种和时间范围，点击查询按钮</p>
      </div>
      <table id="dataTable" style="display:none">
        <thead>
          <tr>
            <th onclick="sortTable(0)">时间 <span class="sort-icon">↕</span></th>
            <th onclick="sortTable(1)">资金费率 <span class="sort-icon">↕</span></th>
            <th onclick="sortTable(2)">年化费率 <span class="sort-icon">↕</span></th>
            <th onclick="sortTable(3)">Premium <span class="sort-icon">↕</span></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = 'https://api.hyperliquid.xyz/info';
let allData = [];
let chart = null;
let sortCol = 0, sortAsc = false;

document.getElementById('range').addEventListener('change', e => {
  document.getElementById('customRange').style.display = e.target.value === 'custom' ? 'flex' : 'none';
});

document.getElementById('coin').addEventListener('keydown', e => {
  if (e.key === 'Enter') query();
});

function getTimeRange() {
  const sel = document.getElementById('range').value;
  const now = Date.now();
  if (sel === 'custom') {
    const s = document.getElementById('startDate').value;
    const e = document.getElementById('endDate').value;
    if (!s || !e) { alert('请选择起止日期'); return null; }
    return { start: new Date(s).getTime(), end: new Date(e + 'T23:59:59').getTime() };
  }
  return { start: now - parseInt(sel) * 86400000, end: now };
}

async function fetchFunding(coin, startTime, endTime) {
  const records = [];
  let cursor = startTime;
  const progress = document.getElementById('progressText');
  while (cursor < endTime) {
    progress.textContent = `加载中... 已获取 ${records.length} 条`;
    const body = { type: 'fundingHistory', coin: coin.toUpperCase(), startTime: cursor };
    const resp = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!resp.ok) throw new Error(`API 错误: ${resp.status}`);
    const data = await resp.json();
    if (!data.length) break;
    const filtered = data.filter(d => d.time <= endTime);
    records.push(...filtered);
    if (data.length < 500) break;
    cursor = data[data.length - 1].time + 1;
  }
  progress.textContent = '';
  return records;
}

async function query() {
  const coin = document.getElementById('coin').value.trim();
  if (!coin) { alert('请输入币种'); return; }
  const range = getTimeRange();
  if (!range) return;

  const btn = document.getElementById('queryBtn');
  btn.disabled = true;
  btn.textContent = '查询中...';
  document.getElementById('emptyState').innerHTML = '<div class="loading"><span class="spinner"></span>正在加载数据...</div>';
  document.getElementById('dataTable').style.display = 'none';
  document.getElementById('statsSection').style.display = 'none';
  document.getElementById('chartBox').style.display = 'none';

  try {
    allData = await fetchFunding(coin, range.start, range.end);
    if (!allData.length) {
      document.getElementById('emptyState').innerHTML = '<div class="empty"><p>未找到数据，请检查币种名称是否正确</p></div>';
      document.getElementById('emptyState').style.display = 'block';
      return;
    }
    allData.sort((a, b) => b.time - a.time);
    sortCol = 0; sortAsc = false;
    renderStats(coin);
    renderChart(coin);
    renderTable();
    document.getElementById('tableTitle').textContent = `${coin.toUpperCase()} 资金费率明细（共 ${allData.length} 条）`;
  } catch (e) {
    document.getElementById('emptyState').innerHTML = `<div class="empty"><p>查询失败: ${e.message}</p></div>`;
    document.getElementById('emptyState').style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '查询';
  }
}

function renderStats(coin) {
  const rates = allData.map(d => parseFloat(d.fundingRate));
  const latest = rates[0];
  const avg = rates.reduce((a, b) => a + b, 0) / rates.length;
  const annual = avg * 3 * 365;
  const max = Math.max(...rates);
  const min = Math.min(...rates);

  const fmt = (v, pct = true) => {
    const s = (v * 100).toFixed(4) + '%';
    return pct ? s : v.toFixed(6);
  };
  const cls = v => v >= 0 ? 'positive' : 'negative';

  document.getElementById('statCurrent').innerHTML = `<span class="${cls(latest)}">${fmt(latest)}</span>`;
  document.getElementById('statAvg').innerHTML = `<span class="${cls(avg)}">${fmt(avg)}</span>`;
  document.getElementById('statAnnual').innerHTML = `<span class="${cls(annual)}">${fmt(annual)}</span>`;
  document.getElementById('statRange').innerHTML = `<span class="positive">${fmt(max)}</span> / <span class="negative">${fmt(min)}</span>`;
  document.getElementById('statCount').textContent = allData.length;
  document.getElementById('statsSection').style.display = 'block';
}

function renderChart(coin) {
  const sorted = [...allData].sort((a, b) => a.time - b.time);
  const labels = sorted.map(d => {
    const dt = new Date(d.time);
    return `${(dt.getMonth()+1).toString().padStart(2,'0')}/${dt.getDate().toString().padStart(2,'0')} ${dt.getHours().toString().padStart(2,'0')}:${dt.getMinutes().toString().padStart(2,'0')}`;
  });
  const values = sorted.map(d => parseFloat(d.fundingRate) * 100);

  document.getElementById('chartBox').style.display = 'block';
  if (chart) chart.destroy();

  const ctx = document.getElementById('chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: `${coin.toUpperCase()} 资金费率 (%)`,
        data: values,
        borderColor: '#58a6ff',
        backgroundColor: 'rgba(88,166,255,0.1)',
        borderWidth: 1.5,
        pointRadius: 0,
        pointHitRadius: 10,
        fill: true,
        tension: 0.1
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `费率: ${ctx.parsed.y.toFixed(4)}%`,
            afterLabel: ctx => `年化: ${(ctx.parsed.y * 3 * 365).toFixed(2)}%`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#484f58', maxTicksLimit: 12, maxRotation: 0 },
          grid: { color: '#21262d' }
        },
        y: {
          ticks: { color: '#484f58', callback: v => v.toFixed(4) + '%' },
          grid: { color: '#21262d' }
        }
      }
    }
  });
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = allData.map(d => {
    const rate = parseFloat(d.fundingRate);
    const annual = rate * 3 * 365;
    const premium = parseFloat(d.premium);
    const cls = v => v >= 0 ? 'positive' : 'negative';
    const dt = new Date(d.time);
    const timeStr = `${dt.getFullYear()}-${(dt.getMonth()+1).toString().padStart(2,'0')}-${dt.getDate().toString().padStart(2,'0')} ${dt.getHours().toString().padStart(2,'0')}:${dt.getMinutes().toString().padStart(2,'0')}`;
    return `<tr>
      <td>${timeStr}</td>
      <td class="${cls(rate)}">${(rate*100).toFixed(4)}%</td>
      <td class="${cls(annual)}">${(annual*100).toFixed(2)}%</td>
      <td class="${cls(premium)}">${(premium*100).toFixed(4)}%</td>
    </tr>`;
  }).join('');
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('dataTable').style.display = 'table';
}

function sortTable(col) {
  if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
  const getVal = (d, c) => {
    if (c === 0) return d.time;
    if (c === 1) return parseFloat(d.fundingRate);
    if (c === 2) return parseFloat(d.fundingRate) * 3 * 365;
    return parseFloat(d.premium);
  };
  allData.sort((a, b) => sortAsc ? getVal(a, col) - getVal(b, col) : getVal(b, col) - getVal(a, col));
  renderTable();
}
</script>
</body>
</html>
